name: CI build → push → trigger deploy
on:
  push:
    branches: [ main ]

jobs:
  build-and-trigger:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-24.04-arm
    environment:
      name: crystal1
    env:
      IMAGE_REG: ${{ vars.IMAGE_REG }}
      IMAGE_REPO: ${{ vars.IMAGE_REPO }}
      MANAGER_HOST: ${{ vars.MANAGER_HOST }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Derive TAG
        id: meta
        run: echo "TAG=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ vars.TS_AUDIENCE }}
          tags: tag:ci
          ping: ${{ env.MANAGER_HOST }}

      - name: Route registry over Tailscale
        run: |
          set -euo pipefail
          registry_host="${IMAGE_REG%%/*}"
          registry_host="${registry_host%%:*}"
          manager_ip="$(getent ahostsv4 "${MANAGER_HOST}" | awk '{print $1; exit}')"
          if [[ -z "${registry_host}" || -z "${manager_ip}" ]]; then
            echo "Unable to resolve registry host or manager Tailscale IP" >&2
            exit 1
          fi
          if [[ ! "${manager_ip}" =~ ^100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "Resolved manager IP ${manager_ip} is not in the Tailscale CGNAT range" >&2
            exit 1
          fi
          echo "Routing ${registry_host} to ${manager_ip} over Tailscale"
          escaped_registry_host="${registry_host//./\\.}"
          sudo sed -i.bak "/[[:space:]]${escaped_registry_host}$/d" /etc/hosts
          echo "${manager_ip} ${registry_host}" | sudo tee -a /etc/hosts
          getent hosts "${registry_host}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.IMAGE_REG }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Install Tailwind CLI binary
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-arm64
          chmod +x tailwindcss-linux-arm64
          sudo mv tailwindcss-linux-arm64 /usr/local/bin/tailwindcss
          tailwindcss --version   # sanity check

      - name: Debug refs
        run: |
          echo "IMAGE_REG=${IMAGE_REG}"
          echo "TAG=${{ steps.meta.outputs.TAG }}"

      - name: make build-github (push)
        env:
          VERSION: ${{ steps.meta.outputs.TAG }}
          REVISION: ${{ github.sha }}
          SOURCE_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          make build-github \
            REGISTRY="${IMAGE_REG}" \
            IMAGE_TAG="${{ steps.meta.outputs.TAG }}"

      - name: Install SSH key & known_hosts
        env:
          DEPLOY_KEY: ${{ secrets.LOCAL_REPO_DEPLOY_KEY }}
          KNOWN_HOSTS: ${{ secrets.LOCAL_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Push main to local bare repo (trigger hook)
        env:
          MANAGER: ${{ env.MANAGER_HOST }}
        run: |
          set -euo pipefail
          git remote add local "ssh://git@${MANAGER}/srv/git/bob-ci.git"
          git push --force local HEAD:refs/heads/main
